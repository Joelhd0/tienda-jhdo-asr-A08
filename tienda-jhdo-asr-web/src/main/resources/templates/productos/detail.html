<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${producto.nombre})}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar('productos')}"></nav>
<main class="container py-5">
    <div class="mb-4">
        <a class="btn btn-outline-secondary" th:href="@{/productos}">← Volver a productos</a>
    </div>
    <div class="row g-5">
        <div class="col-12 col-md-5">
            <div class="position-relative">
                <span th:if="${producto.descuento > 0}"
                      class="badge bg-danger position-absolute top-0 end-0 m-2 fs-6"
                      th:text="'-' + ${producto.descuento} + '%'">-10%</span>
                <img th:if="${producto.imagen != null}"
                     th:src="@{${producto.imagen}}"
                     th:alt="'Imagen de ' + ${producto.nombre}"
                     class="img-fluid rounded-3 shadow">
                <img th:if="${producto.imagen == null}"
                     th:src="@{/imagenes/no-disponible.svg}"
                     alt=""
                     class="img-fluid rounded-3 shadow">
            </div>
        </div>
        <div class="col-12 col-md-7">
            <p class="text-muted mb-1" th:if="${producto.marca != null}">
                <a th:href="@{/marcas/{id}(id=${producto.marca.id})}"
                   class="text-muted fw-semibold"
                   th:text="${producto.marca.nombre}">Marca</a>
            </p>

            <h1 class="display-6 fw-bold" th:text="${producto.nombre}">Nombre</h1>

            <p class="text-secondary small">
                <i class="bi bi-upc-scan"></i> EAN-13: <span th:text="${producto.ean}">0000000000000</span>
            </p>

            <div class="mb-3">
                <span th:if="${producto.descuento > 0}">
                    <span class="fs-2 fw-bold text-danger"
                          th:text="${#numbers.formatDecimal(producto.precioConDescuento, 1, 2)} + ' €'">0 €</span>
                    <span class="fs-5 text-muted text-decoration-line-through ms-3"
                          th:text="${#numbers.formatDecimal(producto.precio, 1, 2)} + ' €'">0 €</span>
                </span>
                <span th:if="${producto.descuento == 0}" class="fs-2 fw-bold"
                      th:text="${#numbers.formatDecimal(producto.precio, 1, 2)} + ' €'">0 €</span>
            </div>

            <div class="mb-3" th:if="${not #sets.isEmpty(producto.categorias)}">
                <span class="fw-semibold me-2">Categorías:</span>
                <span th:if="${#sets.size(producto.categorias) == 1}">
                    <th:block th:each="cat : ${producto.categorias}">
                        <a th:href="@{/categorias/{id}(id=${cat.id})}" class="badge bg-primary text-decoration-none"
                           th:text="${cat.nombre}">Cat</a>
                    </th:block>
                </span>
                <ul th:if="${#sets.size(producto.categorias) > 1}" class="list-inline d-inline">
                    <li class="list-inline-item" th:each="cat : ${producto.categorias}">
                        <a th:href="@{/categorias/{id}(id=${cat.id})}" class="badge bg-primary text-decoration-none"
                           th:text="${cat.nombre}">Cat</a>
                    </li>
                </ul>
            </div>

            <form th:action="@{/carrito/añadir/{id}(id=${producto.id})}" method="post" class="mb-4">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="origen"
                       th:value="@{/productos/{id}/{slug}(id=${producto.id},slug=${producto.slug})}">
                <button type="submit" class="btn btn-primary btn-lg">
                    <i class="bi bi-cart-plus me-2" aria-hidden="true"></i>Añadir al carrito
                </button>
            </form>

            <p class="lead" th:text="${producto.descripcion}">Descripción completa.</p>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>

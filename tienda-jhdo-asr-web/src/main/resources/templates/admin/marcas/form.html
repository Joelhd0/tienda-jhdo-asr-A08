<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/admin-layout :: adminHead('Marca')}"></head>
<body>
<div class="container-fluid">
  <div class="row">
    <nav th:replace="~{admin/fragments/admin-layout :: adminSidebar}"></nav>
    <main class="col-md-10 admin-content">
      <h1 class="h3 mb-4">
        <span th:if="${marca.id == null}"><i class="bi bi-plus-circle me-2"></i>Nueva marca</span>
        <span th:if="${marca.id != null}"><i class="bi bi-pencil me-2"></i>Editar marca</span>
      </h1>
      <div th:if="${error}" class="alert alert-danger"><i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}">Error</span></div>
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <form th:action="${marca.id == null} ? @{/admin/marcas/new} : @{/admin/marcas/{id}/edit(id=${marca.id})}" method="post">
            <div class="mb-3">
              <label for="nombre" class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="nombre" name="nombre" th:value="${marca.nombre}" maxlength="100" required>
            </div>
            <div class="mb-4">
              <label for="logo" class="form-label fw-semibold">Logo (URL)</label>
              <input type="text" class="form-control" id="logo" name="logo" th:value="${marca.logo}" maxlength="500" placeholder="/imagenes/marcas/nike.png">
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle me-1"></i>Guardar</button>
              <a th:href="@{/admin/marcas}" class="btn btn-outline-secondary"><i class="bi bi-x-circle me-1"></i>Cancelar</a>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

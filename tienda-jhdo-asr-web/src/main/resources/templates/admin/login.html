<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Acceso administración | Tienda JHDO ASR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); min-height: 100vh; display:flex; align-items:center; justify-content:center; }
        .login-card { width: 100%; max-width: 420px; }
    </style>
</head>
<body>
<div class="login-card p-4">
    <div class="card border-0 shadow-lg rounded-4">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock-fill fs-1 text-primary"></i>
                <h1 class="h4 fw-bold mt-2">Acceso administración</h1>
                <p class="text-muted small">Tienda JHDO ASR</p>
            </div>

            <!-- Mensaje de error -->
            <div th:if="${errorMsg}" class="alert alert-danger d-flex align-items-center gap-2" role="alert">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span th:text="${errorMsg}">Error</span>
            </div>

            <!-- Formulario — Spring Security procesa el POST en /admin/login -->
            <form th:action="@{/admin/login}" method="post">
                <!-- CSRF token — Spring Security lo exige -->
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold">
                        <i class="bi bi-person me-1"></i>Usuario (admin)
                    </label>
                    <input type="text" class="form-control form-control-lg" id="username"
                           name="username" autocomplete="username" autofocus required>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold">
                        <i class="bi bi-lock me-1"></i>Contraseña (admin123)
                    </label>
                    <input type="password" class="form-control form-control-lg" id="password"
                           name="password" autocomplete="current-password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                </button>
            </form>

            <div class="text-center mt-4">
                <a th:href="@{/}" class="text-muted small">
                    <i class="bi bi-arrow-left me-1"></i>Volver a la tienda
                </a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

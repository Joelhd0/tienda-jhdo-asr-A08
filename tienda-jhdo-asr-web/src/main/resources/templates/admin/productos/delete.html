<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/admin-layout :: adminHead('Eliminar producto')}"></head>
<body>
<div class="container-fluid">
  <div class="row">
    <nav th:replace="~{admin/fragments/admin-layout :: adminSidebar}"></nav>
    <main class="col-md-10 admin-content">
      <h1 class="h3 mb-4"><i class="bi bi-trash me-2 text-danger"></i>Eliminar producto</h1>
      <div th:if="${error}" class="alert alert-danger"><i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}">Error</span></div>
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <p class="lead">¿Seguro que desea borrar el producto <strong th:text="${producto.nombre}">Nombre</strong>?</p>
          <form th:action="@{/admin/productos/{id}/delete(id=${producto.id})}" method="post">
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-1"></i>Sí, eliminar</button>
              <a th:href="@{/admin/productos}" class="btn btn-outline-secondary">Cancelar</a>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

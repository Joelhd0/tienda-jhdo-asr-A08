<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/admin-layout :: adminHead('Productos')}"></head>
<body>
<div class="container-fluid">
  <div class="row">
    <nav th:replace="~{admin/fragments/admin-layout :: adminSidebar}"></nav>
    <main class="col-md-10 admin-content">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0"><i class="bi bi-box-seam me-2"></i>Productos</h1>
        <a th:href="@{/admin/productos/new}" class="btn btn-primary"><i class="bi bi-plus-circle me-1"></i>Nuevo producto</a>
      </div>
      <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
          <table class="table table-hover mb-0">
            <thead class="table-dark">
              <tr><th>#</th><th>EAN</th><th>Nombre</th><th>Marca</th><th>Precio</th><th>Dto.</th><th class="text-end">Acciones</th></tr>
            </thead>
            <tbody>
              <tr th:each="p : ${productos}">
                <td th:text="${p.id}">1</td>
                <td class="font-monospace small" th:text="${p.ean}">0000000000000</td>
                <td th:text="${p.nombre}">Nombre</td>
                <td th:text="${p.marca != null} ? ${p.marca.nombre} : '—'">Marca</td>
                <td th:text="${#numbers.formatDecimal(p.precio,1,2)} + ' €'">0 €</td>
                <td><span th:if="${p.descuento > 0}" class="badge bg-danger" th:text="${p.descuento} + '%'">0%</span>
                    <span th:if="${p.descuento == 0}" class="text-muted">—</span></td>
                <td class="text-end">
                  <a th:href="@{/admin/productos/{id}/edit(id=${p.id})}" class="btn btn-sm btn-outline-secondary me-1" aria-label="Editar producto"><i class="bi bi-pencil" aria-hidden="true"></i></a>
                  <a th:href="@{/admin/productos/{id}/delete(id=${p.id})}" class="btn btn-sm btn-outline-danger" aria-label="Eliminar producto"><i class="bi bi-trash" aria-hidden="true"></i></a>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(productos)}"><td colspan="7" class="text-center text-muted py-4">No hay productos registrados.</td></tr>
            </tbody>
            <tfoot>
              <tr><td colspan="20" class="text-muted small px-3 py-2">Total de registros mostrados</td></tr>
            </tfoot>
          </table>
        </div>
      </div>
      <div class="mt-3"><a th:href="@{/admin/productos/new}" class="btn btn-primary"><i class="bi bi-plus-circle me-1"></i>Nuevo producto</a></div>
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

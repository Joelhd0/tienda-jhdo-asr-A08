<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/admin-layout :: adminHead('Producto')}"></head>
<body>
<div class="container-fluid">
  <div class="row">
    <nav th:replace="~{admin/fragments/admin-layout :: adminSidebar}"></nav>
    <main class="col-md-10 admin-content">
      <h1 class="h3 mb-4">
        <span th:if="${producto.id == null}"><i class="bi bi-plus-circle me-2"></i>Nuevo producto</span>
        <span th:if="${producto.id != null}"><i class="bi bi-pencil me-2"></i>Editar producto</span>
      </h1>
      <div th:if="${error}" class="alert alert-danger"><i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}">Error</span></div>
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <form th:action="${producto.id == null} ? @{/admin/productos/new} : @{/admin/productos/{id}/edit(id=${producto.id})}" method="post">
            <div class="row g-3">
              <div class="col-md-8">
                <label class="form-label fw-semibold" for="nombre">Nombre <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="nombre" name="nombre" th:value="${producto.nombre}" maxlength="200" required>
              </div>
              <div class="col-md-4">
                <label class="form-label fw-semibold" for="ean">EAN-13 <span class="text-danger">*</span></label>
                <input type="text" class="form-control font-monospace" id="ean" name="ean" th:value="${producto.ean}" maxlength="13" minlength="13" pattern="\d{13}" required>
              </div>
              <div class="col-md-4">
                <label class="form-label fw-semibold" for="precio">Precio (€) <span class="text-danger">*</span></label>
                <input type="number" step="0.01" min="0.01" class="form-control" id="precio" name="precio" th:value="${producto.precio}" required>
              </div>
              <div class="col-md-4">
                <label class="form-label fw-semibold" for="descuento">Descuento (%)</label>
                <input type="number" min="0" max="99" class="form-control" id="descuento" name="descuento" th:value="${producto.descuento != null} ? ${producto.descuento} : 0">
              </div>
              <div class="col-md-4">
                <label class="form-label fw-semibold" for="marcaId">Marca <span class="text-danger">*</span></label>
                <select class="form-select" id="marcaId" name="marcaId" required>
                  <option value="">-- Selecciona --</option>
                  <option th:each="m : ${marcas}" th:value="${m.id}" th:text="${m.nombre}"
                          th:selected="${producto.marca != null and producto.marca.id == m.id}">Marca</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label fw-semibold" for="imagen">Imagen (URL relativa)</label>
                <input type="text" class="form-control" id="imagen" name="imagen" th:value="${producto.imagen}" maxlength="500" placeholder="/imagenes/productos/nike-pegasus.jpg">
              </div>
              <div class="col-12">
                <label class="form-label fw-semibold" for="descripcion">Descripción <span class="text-danger">*</span></label>
                <textarea class="form-control" id="descripcion" name="descripcion" rows="5" maxlength="4000" required th:text="${producto.descripcion}"></textarea>
              </div>
              <div class="col-12">
                <label class="form-label fw-semibold">Categorías</label>
                <div class="row g-2">
                  <div class="col-md-3" th:each="cat : ${categorias}">
                    <div class="form-check">
                      <input class="form-check-input" type="checkbox" name="categoriasIds"
                             th:value="${cat.id}" th:id="'cat-' + ${cat.id}"
                             th:checked="${producto.categorias != null and producto.categorias.contains(cat)}">
                      <label class="form-check-label" th:for="'cat-' + ${cat.id}" th:text="${cat.nombre}">Cat</label>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="d-flex gap-2 mt-4">
              <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle me-1"></i>Guardar</button>
              <a th:href="@{/admin/productos}" class="btn btn-outline-secondary"><i class="bi bi-x-circle me-1"></i>Cancelar</a>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/admin-layout :: adminHead('Inicio')}"></head>
<body>
<div class="container-fluid">
    <div class="row">
        <nav th:replace="~{admin/fragments/admin-layout :: adminSidebar}"></nav>
        <main class="col-md-10 admin-content">
            <h1 class="h3 mb-4"><i class="bi bi-speedometer2 me-2"></i>Panel de administración</h1>
            <div class="row g-4">
                <div class="col-md-4">
                    <a th:href="@{/admin/marcas}" class="text-decoration-none">
                        <div class="card border-0 shadow-sm text-center p-4">
                            <i class="bi bi-patch-check fs-1 text-primary mb-2"></i>
                            <h2 class="h5">Marcas</h2>
                            <p class="text-muted small mb-0">Gestionar marcas</p>
                        </div>
                    </a>
                </div>
                <div class="col-md-4">
                    <a th:href="@{/admin/productos}" class="text-decoration-none">
                        <div class="card border-0 shadow-sm text-center p-4">
                            <i class="bi bi-box-seam fs-1 text-success mb-2"></i>
                            <h2 class="h5">Productos</h2>
                            <p class="text-muted small mb-0">Gestionar productos</p>
                        </div>
                    </a>
                </div>
                <div class="col-md-4">
                    <a th:href="@{/admin/categorias}" class="text-decoration-none">
                        <div class="card border-0 shadow-sm text-center p-4">
                            <i class="bi bi-grid fs-1 text-warning mb-2"></i>
                            <h2 class="h5">Categorías</h2>
                            <p class="text-muted small mb-0">Gestionar categorías</p>
                        </div>
                    </a>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

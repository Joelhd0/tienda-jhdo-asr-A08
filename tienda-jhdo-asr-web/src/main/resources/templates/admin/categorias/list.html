<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/admin-layout :: adminHead('Categorías')}"></head>
<body>
<div class="container-fluid">
  <div class="row">
    <nav th:replace="~{admin/fragments/admin-layout :: adminSidebar}"></nav>
    <main class="col-md-10 admin-content">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0"><i class="bi bi-grid me-2"></i>Categorías</h1>
        <a th:href="@{/admin/categorias/new}" class="btn btn-primary">
          <i class="bi bi-plus-circle me-1"></i>Nueva categoría
        </a>
      </div>
      <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
          <table class="table table-hover mb-0">
            <thead class="table-dark">
              <tr>
                <th scope="col">#</th>
                <th scope="col">Nombre</th>
                <th scope="col">Descripción</th>
                <th scope="col" class="text-end">Acciones</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="cat : ${categorias}">
                <td th:text="${cat.id}">1</td>
                <td th:text="${cat.nombre}">Nombre</td>
                <td th:text="${#strings.abbreviate(cat.descripcion, 80)}">Desc</td>
                <td class="text-end">
                  <a th:href="@{/admin/categorias/{id}/edit(id=${cat.id})}"
                     class="btn btn-sm btn-outline-secondary me-1"
                     aria-label="Editar categoría">
                    <i class="bi bi-pencil" aria-hidden="true"></i>
                  </a>
                  <a th:href="@{/admin/categorias/{id}/delete(id=${cat.id})}"
                     class="btn btn-sm btn-outline-danger"
                     aria-label="Eliminar categoría">
                    <i class="bi bi-trash" aria-hidden="true"></i>
                  </a>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(categorias)}">
                <td colspan="4" class="text-center text-muted py-4">No hay categorías registradas.</td>
              </tr>
            </tbody>
            <tfoot>
              <tr><td colspan="20" class="text-muted small px-3 py-2">Total de registros mostrados</td></tr>
            </tfoot>
          </table>
        </div>
      </div>
      <div class="mt-3">
        <a th:href="@{/admin/categorias/new}" class="btn btn-primary">
          <i class="bi bi-plus-circle me-1"></i>Nueva categoría
        </a>
      </div>
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

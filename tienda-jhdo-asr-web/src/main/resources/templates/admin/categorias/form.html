<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/admin-layout :: adminHead('Categoría')}"></head>
<body>
<div class="container-fluid">
  <div class="row">
    <nav th:replace="~{admin/fragments/admin-layout :: adminSidebar}"></nav>
    <main class="col-md-10 admin-content">
      <h1 class="h3 mb-4">
        <span th:if="${categoria.id == null}"><i class="bi bi-plus-circle me-2"></i>Nueva categoría</span>
        <span th:if="${categoria.id != null}"><i class="bi bi-pencil me-2"></i>Editar categoría</span>
      </h1>

      <div th:if="${error}" class="alert alert-danger" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}">Error</span>
      </div>

      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <form th:action="${categoria.id == null} ? @{/admin/categorias/new} : @{/admin/categorias/{id}/edit(id=${categoria.id})}"
                method="post">

            <div class="mb-3">
              <label for="nombre" class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="nombre" name="nombre"
                     th:value="${categoria.nombre}" maxlength="100" required>
            </div>

            <div class="mb-3">
              <label for="descripcion" class="form-label fw-semibold">Descripción</label>
              <textarea class="form-control" id="descripcion" name="descripcion"
                        rows="4" maxlength="2000" th:text="${categoria.descripcion}"></textarea>
            </div>

            <div class="mb-4">
              <label for="imagen" class="form-label fw-semibold">Imagen (nombre de archivo)</label>
              <input type="text" class="form-control" id="imagen" name="imagen"
                     th:value="${categoria.imagen}" maxlength="500"
                     placeholder="Ej: running.jpg">
              <div class="form-text">Nombre del archivo en /imagenes/categorias/</div>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-circle me-1"></i>Guardar
              </button>
              <a th:href="@{/admin/categorias}" class="btn btn-outline-secondary">
                <i class="bi bi-x-circle me-1"></i>Cancelar
              </a>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

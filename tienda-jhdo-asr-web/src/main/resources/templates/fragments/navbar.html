<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="navbar(paginaActiva)" class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">Tienda JHDO ASR</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu"
                aria-controls="menu" aria-expanded="false" aria-label="Menú de navegación">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto align-items-lg-center">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${paginaActiva == 'inicio'} ? 'active'"
                       th:href="@{/}">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${paginaActiva == 'categorias'} ? 'active'"
                       th:href="@{/categorias}">Categorías</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${paginaActiva == 'productos'} ? 'active'"
                       th:href="@{/productos}">Productos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${paginaActiva == 'terms'} ? 'active'"
                       th:href="@{/terms}">Condiciones</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${paginaActiva == 'sobre-nosotros'} ? 'active'"
                       th:href="@{/sobre-nosotros}">Sobre nosotros</a>
                </li>
                <!-- Icono carrito con badge -->
                <li class="nav-item ms-lg-2">
                    <a class="nav-link position-relative"
                       th:classappend="${paginaActiva == 'carrito'} ? 'active'"
                       th:href="@{/carrito}" aria-label="Ver carrito">
                        <i class="bi bi-cart3 fs-5"></i>
                        <span th:if="${carritoUnidades > 0}"
                              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                              th:text="${carritoUnidades}"
                              aria-label="Productos en el carrito">0</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${titulo} + ' | Tienda JHDO ASR'">Tienda JHDO ASR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .page-header { background: linear-gradient(135deg,#0d6efd,#0b5ed7); color:#fff; border-radius:1rem; padding:3rem 2rem; }
        .card-producto { border:none; border-radius:1rem; overflow:hidden; box-shadow:0 .5rem 1rem rgba(0,0,0,.08); transition:transform .2s,box-shadow .2s; }
        .card-producto:hover { transform:translateY(-5px); box-shadow:0 1rem 2rem rgba(0,0,0,.12); }
        .card-producto img { height:220px; object-fit:cover; }
        .badge-descuento { position:absolute; top:.5rem; right:.5rem; font-size:.85rem; }
        footer { background-color:#212529; color:#fff; }
    </style>
</head>
</html>

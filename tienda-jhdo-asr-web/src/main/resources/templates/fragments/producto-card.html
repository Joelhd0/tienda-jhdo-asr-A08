<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="productoCard(p)" class="card card-producto h-100 position-relative">
    <!-- Badge de descuento -->
    <span th:if="${p.descuento > 0}"
          class="badge bg-danger badge-descuento position-absolute"
          th:text="'-' + ${p.descuento} + '%'">-15%</span>

    <!-- Imagen -->
    <a th:href="@{/productos/{id}/{slug}(id=${p.id},slug=${p.slug})}">
        <img th:if="${p.imagen != null}"
             th:src="@{${p.imagen}}"
             th:alt="'Imagen de ' + ${p.nombre}"
             class="card-img-top">
        <img th:if="${p.imagen == null}"
             th:src="@{/imagenes/no-disponible.svg}"
             alt=""
             class="card-img-top">
    </a>

    <div class="card-body d-flex flex-column">
        <!-- Nombre como enlace -->
        <h2 class="h5 card-title">
            <a th:href="@{/productos/{id}/{slug}(id=${p.id},slug=${p.slug})}"
               class="text-decoration-none text-dark"
               th:text="${p.nombre}">Nombre</a>
        </h2>

        <!-- Marca -->
        <p class="text-muted small mb-1" th:if="${p.marca != null}">
            <a th:href="@{/marcas/{id}(id=${p.marca.id})}"
               class="text-muted"
               th:text="${p.marca.nombre}">Marca</a>
        </p>

        <!-- Precio -->
        <div class="mb-2">
            <span th:if="${p.descuento > 0}">
                <strong class="text-danger fs-5"
                        th:text="${#numbers.formatDecimal(p.precioConDescuento, 1, 2)} + ' €'">0 €</strong>
                <span class="text-muted text-decoration-line-through ms-2"
                      th:text="${#numbers.formatDecimal(p.precio, 1, 2)} + ' €'">0 €</span>
            </span>
            <strong th:if="${p.descuento == 0}" class="fs-5"
                    th:text="${#numbers.formatDecimal(p.precio, 1, 2)} + ' €'">0 €</strong>
        </div>

        <!-- Descripción truncada -->
        <p class="card-text flex-grow-1 small text-secondary"
           th:text="${#strings.abbreviate(p.descripcion, 200)}">Descripción...</p>

        <!-- Categorías -->
        <div class="mb-2">
            <p th:if="${#sets.size(p.categorias) == 1}" class="mb-1 small">
                <th:block th:each="cat : ${p.categorias}">
                    <a th:href="@{/categorias/{id}(id=${cat.id})}" class="badge bg-secondary text-decoration-none"
                       th:text="${cat.nombre}">Cat</a>
                </th:block>
            </p>
            <ul th:if="${#sets.size(p.categorias) > 1}" class="list-inline mb-1">
                <li class="list-inline-item" th:each="cat : ${p.categorias}">
                    <a th:href="@{/categorias/{id}(id=${cat.id})}" class="badge bg-secondary text-decoration-none"
                       th:text="${cat.nombre}">Cat</a>
                </li>
            </ul>
        </div>

        <!-- Botón añadir al carrito — origen fijo a /productos para evitar errores en fragmentos -->
        <div class="mt-auto">
            <form th:action="@{/carrito/añadir/{id}(id=${p.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="origen" value="/productos">
                <button type="submit" class="btn btn-primary btn-sm w-100">
                    <i class="bi bi-cart-plus me-1" aria-hidden="true"></i>Añadir al carrito
                </button>
            </form>
        </div>
    </div>
</div>
</body>
</html>

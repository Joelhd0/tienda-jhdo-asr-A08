<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Categorías')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar('categorias')}"></nav>
<main class="container py-5">
    <section class="page-header mb-5">
        <h1 class="display-6 fw-bold mb-2">Categorías</h1>
        <p class="mb-0">Explora nuestras categorías y descubre la colección disponible.</p>
    </section>
    <section class="row g-4">
        <div class="col-12 col-md-6 col-lg-4" th:each="cat : ${categorias}">
            <div class="card card-producto h-100">
                <img th:if="${cat.imagen != null}"
                     th:src="@{/imagenes/categorias/{img}(img=${cat.imagen})}"
                     th:alt="${cat.nombre}" class="card-img-top" style="height:220px;object-fit:cover;">
                <img th:if="${cat.imagen == null}"
                     th:src="@{/imagenes/categorias/not-available.jpg}"
                     alt="" class="card-img-top" style="height:220px;object-fit:cover;">
                <div class="card-body d-flex flex-column">
                    <h2 class="h4 card-title" th:text="${cat.nombre}">Nombre</h2>
                    <p class="card-text flex-grow-1" th:text="${cat.descripcion}">Descripción</p>
                    <a class="btn btn-primary mt-2" th:href="@{/categorias/{id}(id=${cat.id})}">Ver categoría</a>
                </div>
            </div>
        </div>
    </section>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Carrito')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar('carrito')}"></nav>

<main class="container py-5">
    <h1 class="display-6 fw-bold mb-4">
        <i class="bi bi-cart3 me-2"></i>Tu carrito
    </h1>

    <!-- Carrito vacío -->
    <div th:if="${#lists.isEmpty(items)}" class="text-center py-5">
        <i class="bi bi-cart-x display-1 text-muted"></i>
        <p class="lead mt-3 text-muted">Tu carrito está vacío.</p>
        <a th:href="@{/productos}" class="btn btn-primary mt-2">Ver productos</a>
    </div>

    <!-- Carrito con productos -->
    <div th:if="${not #lists.isEmpty(items)}">
        <div class="card border-0 shadow-sm rounded-3 mb-4">
            <div class="card-body p-0">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th scope="col" style="width:80px"></th>
                            <th scope="col">Producto</th>
                            <th scope="col" class="text-center">Precio unit.</th>
                            <th scope="col" class="text-center">Cantidad</th>
                            <th scope="col" class="text-end">Subtotal</th>
                            <th scope="col" class="text-end"></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${items}">
                            <!-- Imagen -->
                            <td class="ps-3">
                                <img th:if="${item.imagen != null}"
                                     th:src="@{${item.imagen}}"
                                     th:alt="${item.nombre}"
                                     class="rounded" style="width:60px;height:60px;object-fit:cover;">
                                <img th:if="${item.imagen == null}"
                                     th:src="@{/imagenes/no-disponible.svg}"
                                     alt=""
                                     class="rounded" style="width:60px;height:60px;object-fit:cover;">
                            </td>

                            <!-- Nombre -->
                            <td>
                                <a th:href="@{/productos/{id}(id=${item.productoId})}"
                                   class="fw-semibold text-decoration-none text-dark"
                                   th:text="${item.nombre}">Producto</a>
                            </td>

                            <!-- Precio unitario -->
                            <td class="text-center"
                                th:text="${#numbers.formatDecimal(item.precioUnitario,1,2)} + ' €'">0 €</td>

                            <!-- Controles de cantidad -->
                            <td class="text-center">
                                <div class="d-flex align-items-center justify-content-center gap-2">
                                    <form th:action="@{/carrito/reducir/{id}(id=${item.productoId})}" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button type="submit" class="btn btn-outline-secondary btn-sm"
                                                aria-label="Reducir cantidad">
                                            <i class="bi bi-dash" aria-hidden="true"></i>
                                        </button>
                                    </form>
                                    <span class="fw-bold" th:text="${item.cantidad}">1</span>
                                    <form th:action="@{/carrito/añadir/{id}(id=${item.productoId})}" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <input type="hidden" name="origen" value="/carrito">
                                        <button type="submit" class="btn btn-outline-secondary btn-sm"
                                                aria-label="Aumentar cantidad">
                                            <i class="bi bi-plus" aria-hidden="true"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>

                            <!-- Subtotal -->
                            <td class="text-end fw-semibold"
                                th:text="${#numbers.formatDecimal(item.subtotal,1,2)} + ' €'">0 €</td>

                            <!-- Eliminar línea -->
                            <td class="text-end pe-3">
                                <form th:action="@{/carrito/eliminar/{id}(id=${item.productoId})}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button type="submit" class="btn btn-outline-danger btn-sm"
                                            aria-label="Eliminar del carrito">
                                        <i class="bi bi-trash" aria-hidden="true"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                    <tfoot class="table-light">
                        <tr>
                            <td colspan="4" class="text-end fw-bold fs-5 pe-3">Total</td>
                            <td class="text-end fw-bold fs-5 text-primary"
                                th:text="${#numbers.formatDecimal(total,1,2)} + ' €'">0 €</td>
                            <td></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>

        <!-- Acciones del carrito -->
        <div class="d-flex flex-wrap justify-content-between gap-2">
            <form th:action="@{/carrito/vaciar}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-danger">
                    <i class="bi bi-trash me-1"></i>Vaciar carrito
                </button>
            </form>
            <div class="d-flex gap-2">
                <a th:href="@{/productos}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i>Seguir comprando
                </a>
                <button class="btn btn-success" disabled title="Funcionalidad de pago no disponible">
                    <i class="bi bi-credit-card me-1"></i>Finalizar compra
                </button>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
